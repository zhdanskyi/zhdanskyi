    <main class="content-container"
        style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 50vh;">

        <div class="page-header">
            <h1 class="page-title" data-i18n="nav.04">CONTACTO</h1>
        </div>

        <div class="contact-wrapper">
            <form action="https://formsubmit.co/zhdanskyibusiness@gmail.com" method="POST">
                <div class="form-group">
                    <label class="form-label" data-i18n="cont.name">> IDENTIFICATE (NOMBRE):</label>
                    <input type="text" name="name" class="form-input" required placeholder="_" data-i18n="cont.name.ph">
                </div>

                <div class="form-group">
                    <label class="form-label" data-i18n="cont.email">> CANAL DE COMUNICACION (EMAIL):</label>
                    <input type="email" name="email" class="form-input" required placeholder="_"
                        data-i18n="cont.email.ph">
                </div>

                <div class="form-group">
                    <label class="form-label" data-i18n="cont.msg">> TRANSMISION (MENSAJE):</label>
                    <textarea name="message" rows="5" class="form-input" required placeholder="_"
                        data-i18n="cont.msg.ph"></textarea>
                </div>

                <button type="submit" class="btn-submit" data-i18n="cont.send">[ ENVIAR TRANSMISION ]</button>
            </form>

            <div style="margin-top: 2rem; text-align: center; border-top: 1px dashed #333; padding-top: 1rem;">
                <p style="color: #666; font-size: 0.8rem; margin-bottom: 1rem;" data-i18n="cont.or">O ESTABLECE ENLACE DIRECTO:</p>
