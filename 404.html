<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- evitar indexar pagina de errores -->
    <meta name="robots" content="noindex, follow">
    <title>error 404 - sistema no encontrado</title>
    <style>
        body {
            background-color: #050505;
            color: #0f0;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            color: #b537f2;
            text-shadow: 0 0 10px #b537f2;
            margin-bottom: 5px;
        }
        .terminal-404 {
            background-color: #111;
            border: 1px solid #333;
            border-top: 25px solid #222;
            border-radius: 5px 5px 0 0;
            padding: 30px;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
            position: relative;
        }
        /* botones decorativos de terminal */
        .terminal-404::before {
            content: "";
            position: absolute;
            top: -15px;
            left: 15px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff5f56;
            box-shadow: 18px 0 0 #ffbd2e, 36px 0 0 #27c93f;
        }
        p {
            margin: 10px 0;
            font-size: 1.1rem;
        }
        .blinking-cursor {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .link-manual {
            display: inline-block;
            margin-top: 30px;
            color: #b537f2;
            text-decoration: none;
            border: 1px dashed #b537f2;
            padding: 8px 15px;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .link-manual:hover {
            background-color: #b537f2;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="terminal-404">
        <h1>ERR_404: DATA_NOT_FOUND</h1>
        <p style="text-align: left;">> Escaneando sistema...</p>
        <p style="text-align: left; color: #ff5f56;">> FATAL: El archivo o directorio solicitado no existe.</p>
        <p style="text-align: left;">> Iniciando protocolo de salto de seguridad...</p>
        <br>
        <p>> Reubicando a la raiz del sistema en <span id="countdown" style="font-weight: bold; color: #fff;">5</span> segundos<span class="blinking-cursor">_</span></p>
        
        <!-- enlace semantico para navegacion crawleable -->
        <a href="index.html" class="link-manual">[ ACCION MANUAL: VOLVER A DIRECTORIO RAIZ ]</a>
    </div>

    <!-- script aplazado por normas seo extremas -->
    <script defer>
        // logica de redireccion a los 5 segundos
        let timeLeft = 5;
        const countdownEl = document.getElementById('countdown');
        const timer = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = 'index.html'; // redireccion al index
            }
        }, 1000);
    </script>
</body>
</html>
